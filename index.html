  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Get language from URL before loading widget
      (function() {
        const path = window.location.pathname;
        const lang = path.split('/')[1] || 'en';
        
        const translations = {
          en: {
            mainLabel: 'Talk with Us',
            emptyChatMessage: 'Hello! Welcome to CPET-YouCH Online Academy. Feel free to ask any questions about courses, admissions, or teacher training!'
          },
          zh: {
            mainLabel: '與我們對話',
            emptyChatMessage: '您好！歡迎來到 CPET-YouCH 線上學院，有任何關於課程、招生或教師培訓的問題，請隨時詢問！'
          },
          es: {
            mainLabel: 'Habla con Nosotros',
            emptyChatMessage: '¡Hola! Bienvenido a CPET-YouCH Online Academy. ¡No dudes en hacer cualquier pregunta sobre cursos, admisiones o formación de profesores!'
          },
          fr: {
            mainLabel: 'Parlez avec Nous',
            emptyChatMessage: 'Bonjour ! Bienvenue à CPET-YouCH Online Academy. N\'hésitez pas à poser des questions sur les cours, les admissions ou la formation des enseignants !'
          },
          de: {
            mainLabel: 'Sprechen Sie mit Uns',
            emptyChatMessage: 'Hallo! Willkommen bei der CPET-YouCH Online Academy. Stellen Sie gerne Fragen zu Kursen, Zulassungen oder Lehrerausbildung!'
          },
          it: {
            mainLabel: 'Parla con Noi',
            emptyChatMessage: 'Ciao! Benvenuto alla CPET-YouCH Online Academy. Sentiti libero di fare domande su corsi, ammissioni o formazione degli insegnanti!'
          },
          ja: {
            mainLabel: 'お話しください',
            emptyChatMessage: 'こんにちは！CPET-YouCH Online Academyへようこそ。コース、入学、教師研修について、お気軽にご質問ください！'
          },
          ko: {
            mainLabel: '문의하기',
            emptyChatMessage: '안녕하세요! CPET-YouCH Online Academy에 오신 것을 환영합니다. 과정, 입학 또는 교사 연수에 대해 궁금한 점이 있으시면 언제든지 문의해 주세요!'
          },
          vi: {
            mainLabel: 'Trò Chuyện với Chúng Tôi',
            emptyChatMessage: 'Xin chào! Chào mừng đến với CPET-YouCH Online Academy. Hãy thoải mái đặt bất kỳ câu hỏi nào về khóa học, tuyển sinh hoặc đào tạo giáo viên!'
          },
          th: {
            mainLabel: 'พูดคุยกับเรา',
            emptyChatMessage: 'สวัสดี! ยินดีต้อนรับสู่ CPET-YouCH Online Academy สอบถามเกี่ยวกับหลักสูตร การรับสมัคร หรือการฝึกอบรมครูได้ตามสบาย!'
          },
          ms: {
            mainLabel: 'Bercakap dengan Kami',
            emptyChatMessage: 'Hello! Selamat datang ke CPET-YouCH Online Academy. Sila tanya apa-apa soalan tentang kursus, kemasukan, atau latihan guru!'
          }
        };
        
        const translation = translations[lang] || translations.en;
        
        // Create script element with correct attributes
        const script = document.createElement('script');
        script.id = 'readdy-agent-widget';
        script.src = 'https://readdy.ai/api/public/assistant/widget?projectId=69f35718-340b-450b-8fa7-1fa3d144200d';
        script.setAttribute('mode', 'hybrid');
        script.setAttribute('voice-show-transcript', 'true');
        script.setAttribute('theme', 'light');
        script.setAttribute('size', 'compact');
        script.setAttribute('accent-color', '#DC2626');
        script.setAttribute('button-base-color', '#1F2937');
        script.setAttribute('button-accent-color', '#FFFFFF');
        script.setAttribute('main-label', translation.mainLabel);
        script.setAttribute('empty-chat-message', translation.emptyChatMessage);
        script.defer = true;
        
        document.body.appendChild(script);
        
        // Monitor route changes and reload widget if language changes
        let lastLang = lang;
        setInterval(() => {
          const currentPath = window.location.pathname;
          const currentLang = currentPath.split('/')[1] || 'en';
          
          if (currentLang !== lastLang) {
            lastLang = currentLang;
            const newTranslation = translations[currentLang] || translations.en;
            
            // Remove old widget
            const oldScript = document.getElementById('readdy-agent-widget');
            if (oldScript) {
              oldScript.remove();
            }
            
            // Remove widget UI elements
            const widgetButton = document.getElementById('vapi-widget-floating-button');
            if (widgetButton) {
              widgetButton.remove();
            }
            
            const widgetContainer = document.querySelector('[data-vapi-widget]');
            if (widgetContainer) {
              widgetContainer.remove();
            }
            
            // Add new widget with updated language
            setTimeout(() => {
              const newScript = document.createElement('script');
              newScript.id = 'readdy-agent-widget';
              newScript.src = 'https://readdy.ai/api/public/assistant/widget?projectId=69f35718-340b-450b-8fa7-1fa3d144200d';
              newScript.setAttribute('mode', 'hybrid');
              newScript.setAttribute('voice-show-transcript', 'true');
              newScript.setAttribute('theme', 'light');
              newScript.setAttribute('size', 'compact');
              newScript.setAttribute('accent-color', '#DC2626');
              newScript.setAttribute('button-base-color', '#1F2937');
              newScript.setAttribute('button-accent-color', '#FFFFFF');
              newScript.setAttribute('main-label', newTranslation.mainLabel);
              newScript.setAttribute('empty-chat-message', newTranslation.emptyChatMessage);
              newScript.defer = true;
              
              document.body.appendChild(newScript);
            }, 100);
          }
        }, 300);
      })();
    </script>
  </body>
